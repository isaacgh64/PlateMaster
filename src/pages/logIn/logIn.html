<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlateMaster</title>
    <link rel="stylesheet" type="text/css" href="logIn.css">
</head>
<body>
    <div id="page">
        <!--Aquí cargaremos nuestra cabecera-->
        <div id="header">
            
        </div>
        <!--Form Login-->
        <form action="logIn.php">
            <!--Creamos el form de nuestro LogIn-->
            <div id="logIn">
                <img src="../../../assets/logIn/logIn.png" alt="Log In">
                <br>
                <input type="text" name="user" id="inputUser" placeholder="Usuario" required>
                <br>
                <!--Creamos un div para añadir un botón que nos permita ver la contraseña o ocultarla-->
                <div id="pass">
                    <input id="password" type="password" name="password" placeholder="Contraseña" required>
                    <button type="button" onclick=showPassword()><img id="eye" src="../../../assets/logIn/hidePassword.png" alt="ege"></button>
                </div>
                <br>
                <!--Botón que iniciaría sesión-->
                <input type="submit" name="btn_logIn" value="Iniciar sesión" id="btnLogIn">
            </div>
        </form>
    </div>
    
</body>
<script src="login.js"></script>
</html>
